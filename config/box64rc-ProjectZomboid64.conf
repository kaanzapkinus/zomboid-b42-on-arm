# Append this block to /etc/box64.box64rc
# (box64 matches the process name "ProjectZomboid64" against the [section] header, case-insensitive)
#
# STRONGMEM=3 is the single most important line: with a lower value the emulated
# multithreaded JVM deadlocks partway through boot. It costs some speed but it's
# the difference between "boots" and "hangs forever".

[ProjectZomboid64]
BOX64_DYNAREC_STRONGMEM=3
BOX64_DYNAREC_SAFEFLAGS=2
BOX64_DYNAREC_ALIGNED_ATOMICS=1
BOX64_JVM=0
BOX64_SSE42=0
BOX64_MAXCPU=4
